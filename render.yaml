services:
  - type: web
    name: follow-up-radar-mcp
    runtime: docker
    plan: free
    repo: https://github.com/DaymondGoulderHorobin/follow-up-radar-mcp
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: FIXTURE_MODE
        value: "true"
      - key: FHIR_SYNTHETIC_BUNDLE_PATH
        value: data/synthetic_patient_bundle.json
      - key: LIVE_FHIR_READS_ENABLED
        value: "false"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8000"
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: MCP_JSON_RESPONSE
        value: "false"
      - key: MCP_STATELESS_HTTP
        value: "false"
      - key: ALLOWED_ORIGINS
        value: ""
      - key: LLM_PROVIDER
        value: disabled
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: LLM_TIMEOUT_SECONDS
        value: "20"
      - key: LLM_MAX_OUTPUT_TOKENS
        value: "700"
